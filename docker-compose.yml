  # --- SERVIDOR COMPOSITE: Contiene la base de datos compuesta ---
  neo4j-composite:
    image: neo4j:enterprise
    hostname: composite
    container_name: composite
    networks:
      - sevilla
    ports:
      - "7484:7474"
      - "7697:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"

      # Instalar plugins automáticamente y permitir su uso completo
      #NEO4J_PLUGINS: '["graph-data-science"]'

      #NEO4J_dbms_security_procedures_unrestricted: gds.*
      #NEO4J_dbms_security_procedures_allowlist: gds.*

      # Bolt propio del composite (para conectarte desde host con neo4j://)
      NEO4J_server_bolt_listen__address: 0.0.0.0:7687
      NEO4J_server_bolt_advertised__address: composite:7687

      # Http (solo HUI)
      NEO4J_server_http_advertised__address: localhost:7484

      # Configuración para el keystore
      NEO4J_dbms_security_keystore_path: /var/lib/neo4j/certificates/keystore.jks
      NEO4J_dbms_security_keystore_password: password
      NEO4J_dbms_security_key_name: neo4j

    volumes:
      - ./data/composite:/data
      - ./logs/composite:/logs
      #- ./plugins:/plugins
      - ./certs/composite:/var/lib/neo4j/certificates

  # --- SERVIDORES PROXY-1: Interfaz común de entrada al nodo Fog1 ---
  ha-proxy-1:
    image: haproxy:latest
    hostname: ha-proxy-1
    container_name: ha-proxy-1
    volumes:
      - ./scripts/fog1/haproxy1.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - sevilla
    depends_on:
      # Hasta que no se inicien los nodos del cluster no se inicia el proxy (secuencia logica)
      - neo4j-fog1-a
      - neo4j-fog1-b
      - neo4j-fog1-c

  # --- SERVIDORES PROXY-2: Interfaz común de entrada al nodo Fog2 ---
  ha-proxy-2:
    image: haproxy:latest
    hostname: ha-proxy-2
    container_name: ha-proxy-2
    volumes:
      - ./scripts/fog2/haproxy2.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - sevilla
    depends_on:
      # Hasta que no se inicien los nodos del cluster no se inicia el proxy (secuencia logica)
      - neo4j-fog2-a
      - neo4j-fog2-b
      - neo4j-fog2-c

  # --- SERVIDORES PROXY-3: Interfaz común de entrada al nodo Fog3 ---
  ha-proxy-3:
    image: haproxy:latest
    hostname: ha-proxy-3
    container_name: ha-proxy-3
    volumes:
      - ./scripts/fog3/haproxy3.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - sevilla
    depends_on:
      # Hasta que no se inicien los nodos del cluster no se inicia el proxy (secuencia logica)
      - neo4j-fog3-a
      - neo4j-fog3-b
      - neo4j-fog3-c

  # --- CLIENTE neo4j-dev-iomt: Simula el dispositivo médico para el envío de datos ---
  neo4j-dev-iomt:
    image: neo4j:enterprise
    hostname: neo4j-dev-iomt
    container_name: neo4j-dev-iomt
    networks:
      - sevilla
    environment:
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"

    # Sirve para mantener el contenedor encendido sin arrancar ninguna base de datos
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - ./scripts:/var/lib/neo4j/scripts
      #- ./import:/var/lib/neo4j/import

  # --- CONTENEDOR DE CONFIGURACIÓN AUTOMÁTICA ---
  neo4j-setup:
    image: python:3.11-slim
    container_name: neo4j-setup
    networks:
      - sevilla
    volumes:
      - ./scripts:/scripts
    command: >
      bash -c "pip install neo4j && echo 'Entorno listo' && tail -f /dev/null"
    depends_on:
      - neo4j-fog1-a
      - neo4j-fog2-a
      - neo4j-fog3-a
      - neo4j-composite
