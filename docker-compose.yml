networks:
  sevilla:
    driver: bridge

services:
  # --- SERVIDOR FOG1.a: Contiene datos del nodo Fog1 ---
  neo4j-fog1-a:
    image: neo4j:enterprise
    hostname: fog1-a
    container_name: fog1-a
    networks:
      sevilla:
        aliases:
          - neo4j-cluster-1
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_dbms_security_cluster__status__auth__enabled: "false"

      # Clustering
      NEO4J_initial_server_mode__constraint: PRIMARY
      NEO4J_dbms_cluster_endpoints: fog1-a:6000, fog1-b:6000, fog1-c:6000
      NEO4J_initial_dbms_automatically__enable__free__servers: "true"

      # Habilita TLS en el conector Bolt
      NEO4J_server_bolt_tls__level: OPTIONAL

      # Define la SSL policy "bolt" usando PEM
      NEO4J_dbms_ssl_policy_bolt_enabled: "true"
      NEO4J_dbms_ssl_policy_bolt_base__directory: /var/lib/neo4j/certificates/bolt
      NEO4J_dbms_ssl_policy_bolt_private__key: private.key
      NEO4J_dbms_ssl_policy_bolt_public__certificate: public.crt
      NEO4J_dbms_ssl_policy_bolt_client__auth: NONE

      # Bolt (client-side routing depende de estas direcciones)
      NEO4J_server_bolt_listen__address: 0.0.0.0:7687
      NEO4J_server_bolt_advertised__address: fog1-a:7687

      #Direcciones intra-cluster (interno de Docker)
      NEO4J_server_cluster_listen__address: 0.0.0.0:6000
      NEO4J_server_cluster_advertised__address: fog1-a:6000

      NEO4J_server_cluster_raft_listen__address: 0.0.0.0:7000
      NEO4J_server_cluster_raft_advertised__address: fog1-a:7000

      # Http (solo HUI)
      NEO4J_server_http_advertised__address: localhost:7474

    volumes:
      - ./data/fog1-a:/data
      - ./logs/fog1-a:/logs
      - ./import:/import
      - ./certs/bolt/fog1-a:/var/lib/neo4j/certificates/bolt

